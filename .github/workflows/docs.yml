name: Dokümantasyon (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek bir deploy; sıradakileri iptal etmeden beklet.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # lastUpdated için git geçmişi

      - name: Node kurulumu
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # package-lock.json npm 11 ile üretildi; CI'daki npm'i eşitle ki
      # `npm ci` kilit dosyasıyla aynı bağımlılık ağacını çözsün.
      - name: npm sürümünü sabitle
        run: npm install -g npm@11

      - name: Bağımlılıklar
        run: npm ci

      - name: VitePress build
        run: npm run docs:build

      - name: Pages yapılandırması
        uses: actions/configure-pages@v5

      - name: Artifact yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages'e deploy
        id: deployment
        uses: actions/deploy-pages@v4
